# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read # to check out the repository

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-slim
    permissions:
      contents: read # to check out the repository
      id-token: write # for npm trusted publishing (OIDC) and provenance
      attestations: write # to generate build provenance attestations
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
